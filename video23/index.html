<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Display property</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }


        .box{
            border: 2px solid blue;
            display: inline-block;
            padding: 20px;
            margin: 10px;
            width: 150px;          
        }
    </style>
</head>
<body>
    <div class="box">
        I am a box
    </div>

    <div class="box">
        I am also a good box
    </div>
</body>
</html>
