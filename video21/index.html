<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Specificity and Cascade</title>
    <style>
        .yellow {
            color: yellow;
        }
        .cred {
            color: red;
        }
        .cpurple {
            color: purple;
        }

        [data="new"] {
            color: blue !important;
        }
    </style>
</head>
<body>
    <div>
        <h1 class="yellow cred cpurple" data="new">CSS Specificity and Cascade</h1>
    </div>
</body>
</html>
